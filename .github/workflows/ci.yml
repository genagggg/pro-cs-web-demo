name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20.x'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm run lint
    - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm run build
    - name: Verify build artifacts
      run: |
        for pkg in host remote-radar remote-offers; do
          if [ -d "$pkg/dist" ]; then
            echo "✓ $pkg built successfully"
            ls -la "$pkg/dist/"
          else
            echo "✗ $pkg build failed — missing dist/"
            exit 1
          fi
        done

  test:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm test || echo "No tests configured — skipping"

  security-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm audit --audit-level=moderate || true

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm run build
    - uses: actions/upload-artifact@v4
      with:
        name: build-preview-${{ github.sha }}
        path: |
          host/dist/
          remote-radar/dist/
          remote-offers/dist/
        retention-days: 7
    - name: Deploy to Vercel (Preview)
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ -z "$VERCEL_TOKEN" ]; then
          echo "Vercel not configured — skipping deploy"
          exit 0
        fi
        npx vercel@latest pull --yes --environment=preview --token=$VERCEL_TOKEN
        npx vercel@latest build --token=$VERCEL_TOKEN
        DEPLOYMENT_URL=$(npx vercel@latest deploy --prebuilt --token=$VERCEL_TOKEN)
        echo "Deployment URL: $DEPLOYMENT_URL"
        echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV
    - name: Comment PR with deployment URL
      if: env.DEPLOYMENT_URL != ''
      uses: actions/github-script@v7
      with:
        script: |
          const deploymentUrl = process.env.DEPLOYMENT_URL;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ Preview deployment ready: ${deploymentUrl}\n\nThis is a preview of the host application. Remote modules (radar, offers) are included in the build.`
          });

  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - run: npm ci
    - run: npm run build
    - name: Deploy to Vercel (Production)
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ -z "$VERCEL_TOKEN" ]; then
          echo "Vercel not configured — skipping deploy"
          exit 0
        fi
        npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN
        npx vercel@latest build --prod --token=$VERCEL_TOKEN
        PRODUCTION_URL=$(npx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN)
        echo "Production deployment URL: $PRODUCTION_URL"
